<!-- یک پروژه فروشگاهی کامل و مستقل با HTML، Tailwind CSS و JavaScript -->
<!-- این فایل برای رفع خطاهای قبلی و افزودن قابلیت کامل سبد خرید طراحی شده است. -->

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فروشگاه آنلاین</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* تنظیمات فونت و استایل‌های اصلی */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
        .container {
            max-width: 1280px;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">
    <!-- Header -->
    <header class="bg-white shadow-md p-4 sticky top-0 z-50">
        <nav class="container mx-auto flex justify-between items-center">
            <a href="#" class="text-2xl font-bold text-blue-600">
                فروشگاه
            </a>
            <button id="cart-button" class="flex items-center text-blue-600 hover:text-blue-800 transition-colors duration-200">
                <!-- Shopping Cart Icon as inline SVG -->
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shopping-cart"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
                <span class="mr-2">سبد خرید</span>
            </button>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto p-4">
        <h1 class="text-4xl font-extrabold text-gray-900 my-8 text-center">محصولات</h1>
        <div id="product-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Product cards will be rendered here by JavaScript -->
        </div>
    </main>

    <!-- Shopping Cart Sidebar -->
    <div id="cart-sidebar" class="fixed inset-y-0 left-0 bg-white shadow-xl z-50 w-full max-w-sm p-6 transform transition-transform duration-300 ease-in-out -translate-x-full">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">سبد خرید</h2>
            <button id="close-cart-button" class="text-gray-500 hover:text-gray-800 text-3xl font-bold">
                &times;
            </button>
        </div>
        <ul id="cart-items" class="space-y-4">
            <!-- Cart items will be rendered here by JavaScript -->
        </ul>
        <p id="empty-cart-message" class="text-gray-600 text-center mt-4">سبد خرید شما خالی است.</p>
    </div>

    <!-- Backdrop for the cart sidebar -->
    <div id="backdrop" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden" style="backdrop-filter: blur(2px);"></div>

    <script>
        // داده‌های ساختگی محصولات
        const products = [
            { id: 1, name: "لپ‌تاپ قدرتمند", price: 35000000, image: "https://placehold.co/600x400/FFF0D8/362B34?text=Product+1" },
            { id: 2, name: "گوشی هوشمند", price: 22000000, image: "https://placehold.co/600x400/D8FFE9/362B34?text=Product+2" },
            { id: 3, name: "ساعت هوشمند", price: 8000000, image: "https://placehold.co/600x400/D8EFFC/362B34?text=Product+3" },
            { id: 4, name: "هدفون بی‌سیم", price: 4500000, image: "https://placehold.co/600x400/FFD8F7/362B34?text=Product+4" },
        ];

        // المان‌های DOM
        const productList = document.getElementById('product-list');
        const cartButton = document.getElementById('cart-button');
        const cartSidebar = document.getElementById('cart-sidebar');
        const closeCartButton = document.getElementById('close-cart-button');
        const backdrop = document.getElementById('backdrop');
        const cartItemsContainer = document.getElementById('cart-items');
        const emptyCartMessage = document.getElementById('empty-cart-message');

        let cart = [];

        // تابع فرمت‌دهی قیمت
        const formatPrice = (price) => {
            return new Intl.NumberFormat('fa-IR').format(price) + ' تومان';
        };

        // تابع رندر کردن کارت محصولات
        const renderProducts = () => {
            productList.innerHTML = products.map(product => `
                <div class="bg-white rounded-3xl shadow-xl overflow-hidden hover:shadow-2xl transition-all duration-300 transform hover:scale-105">
                    <div class="cursor-pointer" data-id="${product.id}">
                        <img src="${product.image}" alt="${product.name}" class="w-full h-48 object-cover">
                        <div class="p-4">
                            <h3 class="text-xl font-bold text-gray-900 mb-2">${product.name}</h3>
                            <p class="text-lg text-blue-600 font-semibold">${formatPrice(product.price)}</p>
                            <button class="add-to-cart-btn mt-4 bg-blue-600 text-white font-bold py-2 px-4 rounded-xl hover:bg-blue-700 transition-colors duration-200">
                                افزودن به سبد خرید
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        };

        // تابع رندر کردن آیتم‌های سبد خرید
        const renderCartItems = () => {
            if (cart.length === 0) {
                emptyCartMessage.classList.remove('hidden');
                cartItemsContainer.innerHTML = '';
            } else {
                emptyCartMessage.classList.add('hidden');
                cartItemsContainer.innerHTML = cart.map((item, index) => `
                    <li class="flex items-center justify-between p-3 bg-gray-50 rounded-xl">
                        <div>
                            <h3 class="font-semibold">${item.name}</h3>
                            <p class="text-sm text-gray-600">${formatPrice(item.price)}</p>
                        </div>
                        <button class="remove-from-cart text-red-500 hover:text-red-700 transition-colors duration-200" data-index="${index}">
                            <!-- Trash icon as inline SVG -->
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-trash-2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
                        </button>
                    </li>
                `).join('');
            }
        };

        // تابع باز و بسته کردن سبد خرید
        const toggleCart = () => {
            const isOpen = cartSidebar.classList.contains('translate-x-0');
            if (isOpen) {
                cartSidebar.classList.add('-translate-x-full');
                cartSidebar.classList.remove('translate-x-0');
                backdrop.classList.add('hidden');
            } else {
                cartSidebar.classList.remove('-translate-x-full');
                cartSidebar.classList.add('translate-x-0');
                backdrop.classList.remove('hidden');
            }
        };

        // اضافه کردن event listenerها
        cartButton.addEventListener('click', toggleCart);
        closeCartButton.addEventListener('click', toggleCart);
        backdrop.addEventListener('click', toggleCart);

        // اضافه کردن محصول به سبد خرید
        productList.addEventListener('click', (e) => {
            const addToCartBtn = e.target.closest('.add-to-cart-btn');
            if (addToCartBtn) {
                const productCard = addToCartBtn.closest('div[data-id]');
                const id = parseInt(productCard.dataset.id);
                const productToAdd = products.find(p => p.id === id);
                if (productToAdd) {
                    cart.push(productToAdd);
                    renderCartItems();
                    toggleCart(); // باز کردن سبد خرید پس از اضافه کردن آیتم
                }
            }
        });

        // حذف محصول از سبد خرید
        cartItemsContainer.addEventListener('click', (e) => {
            if (e.target.closest('.remove-from-cart')) {
                const indexToRemove = parseInt(e.target.closest('.remove-from-cart').dataset.index);
                cart.splice(indexToRemove, 1);
                renderCartItems();
            }
        });

        // رندر اولیه هنگام بارگذاری صفحه
        window.onload = () => {
            renderProducts();
            renderCartItems();
        };
    </script>
</body>
</html>
